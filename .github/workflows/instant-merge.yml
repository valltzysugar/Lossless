name: Instant Merge & Compile

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: merge-and-compile
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Validate and Merge PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # If triggered by workflow_dispatch, PR_URL might be empty. Skip merge step in that case.
          if [ -z "$PR_URL" ]; then
            echo "Manual trigger: skipping PR merge step."
            exit 0
          fi
          
          echo "Validating PR files for $PR_URL..."
          FILES=$(gh pr view "$PR_URL" --json files -q '.files[].path')
          VALID=true
          
          for FILE in $FILES; do
            if [[ "$FILE" != submissions/* && "$FILE" != Music/* ]]; then
              echo "Invalid file found: $FILE"
              VALID=false
              break
            fi
          done
          
          if [ "$VALID" = true ]; then
            echo "Approving PR..."
            gh pr review --approve "$PR_URL" || true
            echo "Merging PR instantly..."
            gh pr merge "$PR_URL" --squash -d || { echo "Failed to merge PR"; exit 1; }
          else
            echo "Closing invalid PR..."
            gh pr comment "$PR_URL" -b "❌ PR contains unauthorized files and was skipped."
            gh pr close "$PR_URL"
            exit 1
          fi

      - name: Compile JSON Submissions
        run: |
          # Pull latest changes in case another job merged just before this one
          git pull origin main --rebase
          python3 .github/scripts/compile.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add music.json submissions/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: compile new submissions to music.json"
            # One more pull rebase just to be absolutely safe from race conditions
            git pull origin main --rebase
            git push origin main
          fi
