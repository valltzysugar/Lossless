name: Batch Process Submissions

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Merge Open PRs
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Fetching open PRs..."
          PRS=$(gh pr list --state open --json number -q '.[].number')
          
          if [ -z "$PRS" ]; then
            echo "No open PRs found."
          else
            for PR in $PRS; do
              echo "Processing PR $PR..."
              FILES=$(gh pr view "$PR" --json files -q '.files[].path')
              VALID=true
              
              for FILE in $FILES; do
                if [[ "$FILE" != submissions/* && "$FILE" != Music/* ]]; then
                  echo "Invalid file found: $FILE"
                  VALID=false
                  break
                fi
              done
              
              if [ "$VALID" = true ]; then
                echo "Approving PR $PR..."
                gh pr review --approve "$PR" || true
                echo "Merging PR $PR..."
                gh pr merge "$PR" --squash -d || echo "Failed to merge PR $PR"
              else
                echo "Closing invalid PR $PR..."
                gh pr comment "$PR" -b "❌ PR contains unauthorized files and was skipped."
                gh pr close "$PR"
              fi
            done
          fi

      - name: Compile JSON Submissions
        run: |
          git pull --rebase origin main
          python3 .github/scripts/compile.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add music.json submissions/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: compile new submissions to music.json"
            git push origin main
          fi
